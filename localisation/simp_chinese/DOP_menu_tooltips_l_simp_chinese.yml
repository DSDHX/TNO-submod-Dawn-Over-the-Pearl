 TNO_dop_icon_tt_delayed: "§F碧圆自洁。向浅洲远渚，亭亭清绝。\n犹有遗簪，不展秋心，能卷几多炎热。\n鸳鸯密语同倾盖，且莫与、浣纱人说。\n恐怨歌、忽断花风，碎却翠云千叠。\n\n回首当年汉舞，怕飞去、谩皱留仙裙折。\n恋恋青衫，犹染枯香，还叹鬓丝飘雪。\n盘心清露如铅水，又一夜、西风吹折。\n喜静看、匹练秋光，倒泻半湖明月。§!"