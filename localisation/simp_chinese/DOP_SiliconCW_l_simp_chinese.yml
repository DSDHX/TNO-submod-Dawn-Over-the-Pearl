 SCW_current_not_enabled_intro: "女冠子·元夕\n【宋】蒋捷"
 SCW_current_not_enabled_intro_content: "蕙花香也。雪晴池馆如画。\n春风飞到，宝钗楼上，一片笙箫，琉璃光射。\n而今灯漫挂。不是暗尘明月，那时元夜。\n况年来、心懒意怯，羞与蛾儿争耍。\n\n江城人悄初更打。\n问繁华谁解，再向天公借。剔残红灺。\n但梦里隐隐，钿车罗帕。吴笺银粉砑。\n待把旧家风景，写成闲话。\n笑绿鬟邻女，倚窗犹唱，夕阳西下。"
