 SCW_gng_per_bar_tt: "§Y[GNG.GetNameWithFlag]§!：§V索尼§!\n————————————\n当前市占率：§Y[?GNG_percentage_for_bar|2%%]§!\n\n广东国的政治体系，是靠科技企业对立法会以及广东民政府的把持来运行的。换句话说，广东国是一方长在电器与芯片上的国家。\n正因如此，芯片冷战的结果对于广东来说至关重要。民政府已经立下目标，誓要成为傲立世界之巅的高新技术霸权，倘若在这次冷战中获胜，广东国将走上摆脱其宗主国经济控制的独立道路，经营消费电子设备，通信设备，信息设备，视听设备的巨头们，乃至不直接研发芯片的长江实业都紧盯着广东的芯片业发展，生怕自身在中没法从中分到一杯羹。\n位居广州的行政长官需要时刻牢记，芯片发展可不是靠西装革履的商人官僚在觥筹交错间就能办到的。"
 SCW_usa_per_bar_tt: "§Y[USA.GetNameWithFlag]§!：§BIBM§!\n————————————\n当前市占率：§Y[?USA_percentage_for_bar|2%%]§!\n\nIBM，英特尔，以及后起之秀苹果电脑公司，这些行业标杆组成了美国独特的一张名片，他们代表着如今人类电子领域探索的边界。成熟的经营模式，庞大的需求市场，海量的技术人才，伴着自由世界百余年的科技积累，不计其数的计算机与家用电器在全世界最大的民主国家美利坚合众国生产出来，并被千家万户的消费者使用，银色巨塔就此铸成。\n在技术领域，目前没有一个国家的电子产业有资格挑战美国的科技巨企，德国与日本要退避三舍，而其他小国的科技产业也因这灯塔般的强光而微弱难见。在硅谷，在三角研究园，永不满足的工程师们仍然不愿停下创新的引擎。如今，个人电脑的时代已经到来，加利福利亚，俄勒冈等州的企业已经做好准备，为西半球的民众提供福祉，为OFN的繁荣昌盛添砖加瓦。\n在芯片冷战中，美国的技术力量似乎注定会博得头筹，但这并不是他国科技产业灰心丧气的理由，正因强敌的存在，本国的技术产业菜有充足的信心与动力前进，来自全球的工程师们将共同带着这份执着走下去，在没有硝烟的战争中为人类创造更美好的明天。"
 SCW_ita_per_bar_tt: "§Y[ITA.GetNameWithFlag]§!：§zSocietà Generale Semiconduttori§!\n————————————\n当前市占率：§Y[?ITA_percentage_for_bar|2%%]§!\n\n提起芯片巨头，人们往往会第一个想到德美日广这些产业大国的企业。而意大利？与芯片似乎产生不了什么联系。\n如果你真这么想，那真是大错特错。\nSGS,全称Società Generale Semiconduttori，其专营半导体器件制造，在集成电路，二极管与晶体管的研发生产方面颇有水平，是从上往下俯视地中海的亚平宁巨头企业。他在1957年正式成立，在风云变幻的六十年代里，没有因政治变迁的冲击倒下，反而是站稳了脚跟，成功击败了涌入势力圈市场的全球敌手。在埃及的冲积平原上，在瑞士的崇山峻岭中，SGS永远都是高新技术的代名词，是当地人民的首选。无论局势如何变化，他和他的母亲意大利亚永远是一支不可忽视的力量。"
 SCW_ger_per_bar_tt: "§Y[GER.GetNameWithFlag]§!：§G西门子§!\n————————————\n当前市占率：§Y[?GER_percentage_for_bar|2%%]§!\n\n提到德国的电子产业，西门子是不可能绕过的存在，它占据了泛欧经济圈九成的芯片份额，在德国统御下的新秩序中，西门子永远占据首席。\n西门子公司由维尔·纳·冯西门子于1847年所创立，早在19世纪末就以及成为了产业规模庞大的技术巨企。在随后的百年内，无论德国发生了怎样的政局变化，政府永远都不会愚蠢到无视西门子公司对科技发展的重大意义。西门子永远都走在德国技术进步的前沿。\n二战以来，西门子通过对英法高新技术产业的并吞，有了萨基姆，辛克莱等当地产业巨头的资产，西门子确保了自身在经济圈内的领导地位，现在，泛欧经济圈的人们只能围绕着西门子生活，从电器到通信设备，社会运行的方方面面都能看见西门子的商标。德国人也许没有建成政治上的千年帝国，但他们在经济上办到了。\n不过，不可一世的西门子帝国，也受德国经济的低效与腐败困扰，作为美国企业的共同对手，它也许不必成为我们的敌人……"
 SCW_jap_per_bar_tt: "§Y[JAP.GetNameWithFlag]§!：§<VLSI研究机构§!\n————————————\n当前市占率：§Y[?JAP_percentage_for_bar|2%%]§!\n\n虽然自四十年代起，日本经历了随势力范围扩张所导致的持续性产业外流，但哪怕到今天，本岛的电子企业也仍然可与日本的国际地位相称。京瓷，东芝，福音电机，尼康，早川电机以及日本电气等会社仍然能成为高精尖产品的代名词。这些企业在发展的过程中被迫成为本岛的三大财阀——三井，三菱，住友的子公司，倚靠三大财阀在共荣圈攻城略地。同时，借着皇国在全球冷战的东风，他们的产品也得以在世界范围内畅销。\n看上去，日本电子工业难以被击败，但很不巧，这一次他的对手是广东。由旧财阀把持的各科技企业早已丧失了自主性，僵化不堪，本岛企业复杂的人情社会和利益链条迫使中低层员工放弃了创新精神，与腐败的日本政军界媾合又无限制地拉低了其运营效率。在芯片竞争加剧的背景下，这些技术会社苦不堪言，只能在衰落的道路上蹒跚前行。\n倘若广东在新的十年里再一次实现了“经济下克上”，日本又该作何反应呢。"
