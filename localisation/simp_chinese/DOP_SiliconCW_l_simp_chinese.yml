 GSA_research_name: "[GetGSAResearchName]"
 GSA_research_name_1: "子弹头列车 阶段一"
 GSA_research_description: "[GetGSAResearchDescription]"
 GSA_research_desc_1: "占位符\n最高设计时速为210公里，实际运营初期时速为210公里，后期通过技术改进提升至220公里；列车编组最初为12节车厢，后来扩展至16节；采用动力分散式驱动，每节车厢底部均安装牵引电机，实现良好的加速与制动性能；车体结构使用轻量化的铝合金材料以降低能耗；供电制式为25千伏50赫兹交流电，通过架空接触网取电；列车定员根据编组不同约为1300至1400人；制动系统包括电制动与空气制动相结合的方式；列车头型采用经典的“子弹头”流线型设计，以降低空气阻力。"
