 DOP_SCW_info_icon_tt: "§W三微米冷战§!\n————————\n毋庸置疑，人人都想要更尖端的技术，更先进的计算力，更好的家用电器、医疗设备、科学仪器，纵使工业皇冠上能有无数颗供媒体与民众追捧的皇冠，一切的基础也终究扎根在电子元器件上，而这一技术的结晶就是芯片，显而易见，这一仅有数微米之厚的小铁片会在接下来的年代里决定我们是否能再一次在全世界范围内掀起一场名为广东的奇迹。"
 DOP_SCW_info_icon_tt_delayed: "三微米冷战的关键在于我们的电子产值在全球产业市场内的占比，而我们的产业份额主要由§C产业规模§!与§m产业竞争力§!决定。§C产业规模§!代表了我国的中低端组装制造业市场能够支撑起多庞大的一条生产线，而§m产业竞争力§!则象征着我国在高新技术领域所开拓的深度。通过点击决议，与不同的企业合作，我们将能通过优化产业链中的五个模块的方式影响这两项数值，并最终实现产业份额的增长。"
 DOP_GSA_info_icon_tt: "§W广东科学院§!\n————————\n无论宣传到底是如何导向的，从客观来讲，任何专业的研究者都不得不承认，广东是一艘由精英掌舵的航船，人们提到它时，想起的是那些位于体面人家中的高科技产品，那些新闻上和电台里报道的经济奇迹，人们所想起的是他们争先恐后想要享受的现代生活，那些琼甘玉露只要让他们尝上一点，就能让人确信自己也是精英的一员。为了回应这种需求，广东科学应运而生，前来供给人们所需要的一切现代享受。"
 DOP_GSA_info_icon_tt_delayed: "每项研究都有一个基础§Q难度§!，而我们则有§y基础研究速度§!和§u研究速度修正§!两个数值，两者相乘得到我们的§G实际研究速度§!。\n用§G实际研究速度§!除以§Q难度§!，可以得到我们的每日预期§M进展§!百分比。\n————————\n§Y当前，我们的§!\n§y基础研究速度§!为§Y[?research_speed_value]§!\n§u研究速度修正§!为§Y[?research_ability_factor|%2]§!"
